name: Daily Page Publish

on:
  schedule:
    - cron: '0 14 * * *'  # 9 AM EST daily
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - dry-run
          - status
          - notices-only
          - locations-only
      slug:
        description: 'Force a specific slug (optional)'
        required: false
        type: string

jobs:
  publish-one-page:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Sync ledger with WP so we never re-publish existing pages
      - name: Sync ledger with WordPress
        run: python daily_publish.py --sync

      # The main event: generate 1 city's paragraphs + publish 1 page + email
      - name: Run daily publisher
        run: |
          FLAGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
            SLUG="${{ inputs.slug }}"
            if [ "$MODE" = "dry-run" ]; then FLAGS="--dry-run"; fi
            if [ "$MODE" = "status" ]; then FLAGS="--status"; fi
            if [ "$MODE" = "notices-only" ]; then FLAGS="--type notices-only"; fi
            if [ "$MODE" = "locations-only" ]; then FLAGS="--type locations-only"; fi
            if [ -n "$SLUG" ]; then FLAGS="$FLAGS --slug $SLUG"; fi
          fi
          python daily_publish.py $FLAGS

      # Save the ledger so tomorrow's run knows what was published
      - name: Commit updated ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publish_ledger.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📄 Daily publish — $(date -u '+%Y-%m-%d')"
            git push
          fi