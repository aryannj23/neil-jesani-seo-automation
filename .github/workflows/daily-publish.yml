name: Daily Page Publish

on:
  schedule:
    - cron: '0 14 * * *'  # 9 AM EST daily
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'publish'
        type: choice
        options:
          - publish
          - dry-run
          - status
      slug:
        description: 'Force a specific slug (optional)'
        required: false
        type: string

jobs:
  publish-one-page:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # Same env vars as your working programmatic-seo pipeline
    env:
      WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Same install as your working pipeline
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Generate AI paragraphs first (same as your programmatic-seo pipeline step 4)
      - name: Generate unique paragraphs via Claude API
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode != 'status') }}
        run: python generate_unique_paragraphs.py

      - name: Sync ledger with existing WP pages
        run: python daily_publish.py --sync

      - name: Run daily publisher
        run: |
          FLAGS=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ inputs.mode }}"
            SLUG="${{ inputs.slug }}"

            if [ "$MODE" = "dry-run" ]; then
              FLAGS="--dry-run"
            elif [ "$MODE" = "status" ]; then
              FLAGS="--status"
            fi

            if [ -n "$SLUG" ]; then
              FLAGS="$FLAGS --slug $SLUG"
            fi
          fi

          python daily_publish.py $FLAGS

      - name: Commit updated ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -f publish_ledger.json ]; then
            git add publish_ledger.json
            if git diff --staged --quiet; then
              echo "No ledger changes to commit."
            else
              git commit -m "📄 Published page — $(date -u '+%Y-%m-%d')"
              git push
            fi
          else
            echo "No publish_ledger.json found — nothing to commit."
          fi